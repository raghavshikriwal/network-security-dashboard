kind = "web"
previewPath = "/"
title = "Network Security Dashboard"
version = "1.0.0"
id = "artifacts/security-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18344

[services.development]
run = "pnpm --filter @workspace/security-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/security-dashboard", "run", "build" ]
publicDir = "artifacts/security-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18344"
BASE_PATH = "/"
